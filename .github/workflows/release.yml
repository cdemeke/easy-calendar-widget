name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build archive
        run: |
          xcodebuild archive \
            -project EasyCalendarWidget.xcodeproj \
            -scheme EasyCalendarWidget \
            -configuration Release \
            -archivePath build/EasyCalendarWidget.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Export app
        run: |
          mkdir -p build/dmg
          cp -R build/EasyCalendarWidget.xcarchive/Products/Applications/EasyCalendarWidget.app build/dmg/

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "EasyCalendarWidget" \
            -srcfolder build/dmg \
            -ov \
            -format UDZO \
            build/EasyCalendarWidget.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/EasyCalendarWidget.dmg
          generate_release_notes: true
